name: data-sync

on:
  workflow_dispatch:

jobs:
  scrape:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python data-sync.py

      - name: Commit CSV
        run: |

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .

          git commit -m "update csv" || echo "nothing to commit"

          git push
